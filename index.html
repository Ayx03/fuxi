<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期末考前突击 - 刷题神器 (完美数据版)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f7f9fc; max-width: 600px; margin: 0 auto; padding: 20px; color: #333; line-height: 1.6; }
        .card { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); margin-top: 15px; }
        
        /* 顶部状态栏 */
        .stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.9em; color: #666; flex-wrap: wrap; gap: 10px; }
        .badge { background: #007bff; color: white; padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.85em; transition: background 0.3s; }
        .controls { display: flex; gap: 10px; }
        .mode-btn { font-weight: bold; text-decoration: none; border: 1px solid currentColor; padding: 4px 12px; border-radius: 12px; transition: 0.2s; font-size: 0.9em; }
        .mode-btn:hover { opacity: 0.8; }
        
        /* 新增：得分统计看板 */
        .scoreboard { display: flex; justify-content: space-between; background: #f8f9fa; padding: 12px 18px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; font-size: 0.95em; border: 1px solid #e9ecef; }
        .score-item { display: flex; align-items: center; gap: 5px; }
        .s-correct { color: #28a745; }
        .s-wrong { color: #dc3545; }
        .s-unanswered { color: #6c757d; }

        .question { font-size: 1.15em; font-weight: bold; margin-bottom: 20px; }
        .option { display: block; background: #f8f9fa; padding: 14px 16px; margin-bottom: 12px; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; word-wrap: break-word; }
        .option:hover { background: #e9ecef; }
        .option.selected { border-color: #28a745; background: #eafaf1; }
        .option.correct { border-color: #28a745; background: #d4edda; color: #155724; font-weight: bold; }
        .option.wrong { border-color: #dc3545; background: #f8d7da; color: #721c24; text-decoration: line-through; }
        
        .btn-group { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        button { padding: 12px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: bold; flex: 1; transition: 0.2s; }
        button:active { transform: scale(0.96); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none !important; }
        .btn-prev { background: #6c757d; color: white; }
        .btn-submit { background: #28a745; color: white; box-shadow: 0 4px 12px rgba(40,167,69,0.3); }
        .btn-next { background: #007bff; color: white; box-shadow: 0 4px 12px rgba(0,123,255,0.3); }
        .feedback { margin-top: 20px; font-weight: bold; text-align: center; font-size: 1.1em; display: none; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <div class="stats">
        <div>
            <span id="progress">进度: 加载中...</span>
            <span class="badge" id="qTypeBadge">加载中</span>
        </div>
        <div class="controls">
            <a href="#" id="toggleShuffle" class="mode-btn">⬇️ 顺序</a>
            <a href="#" id="toggleMode" class="mode-btn">进入错题本</a>
        </div>
    </div>
    
    <div class="scoreboard">
        <div class="score-item s-correct">✅ 正确: <span id="countCorrect">0</span></div>
        <div class="score-item s-wrong">❌ 错误: <span id="countWrong">0</span></div>
        <div class="score-item s-unanswered">⚪ 未做: <span id="countUnanswered">0</span></div>
    </div>

    <div class="question" id="questionText">正在加载题库，请稍候...</div>
    <div id="optionsContainer"></div>
    <div class="feedback" id="feedback"></div>
    
    <div class="btn-group">
        <button class="btn-prev" id="prevBtn">上一题</button>
        <button class="btn-submit" id="submitBtn">提交答案</button>
        <button class="btn-next" id="nextBtn">下一题</button>
    </div>
</div>

<script src="questions.js"></script>

<script>
    if (typeof rawText === 'undefined') {
        document.getElementById('questionText').innerHTML = "<span style='color:red;'>⚠️ 未找到题库数据！请确保 questions.js 文件与 index.html 在同一目录下。</span>";
    } else {
        initApp();
    }

    function initApp() {
        // --- 1. 自动解析题库 ---
        const allQuestions = [];
        const lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== '');
        let currentType = 'single';
        let currentQuestion = null;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (line === '判断题') { currentType = 'tf'; continue; } 
            else if (line === '多选题') { currentType = 'multi'; continue; } 
            else if (line === '单选题') { currentType = 'single'; continue; }

            const titleMatch = line.match(/^(\d+)\.(.*)/);
            if (titleMatch) {
                if (currentQuestion) allQuestions.push(currentQuestion);
                currentQuestion = {
                    id: currentType + '_' + titleMatch[1],
                    type: currentType,
                    title: line,
                    options: [],
                    answer: ''
                };
            } else if (/^[A-D]\./.test(line) || /^[A-D]、/.test(line)) {
                if (currentQuestion) currentQuestion.options.push(line);
            } else if (line.startsWith('答案：') || line.startsWith('答案:')) {
                if (currentQuestion) currentQuestion.answer = line.replace(/答案：|答案:/, '').trim();
            } else {
                if (currentQuestion && currentQuestion.options.length === 0 && !line.startsWith('答案')) {
                    currentQuestion.title += '\n' + line;
                }
            }
        }
        if (currentQuestion) allQuestions.push(currentQuestion);

        // --- 2. 状态控制 ---
        let isMistakeMode = false;
        let isShuffleMode = false;
        let mistakes = JSON.parse(localStorage.getItem('xisi_mistakes')) || [];
        let currentQuestions = [];
        let currentIndex = 0;
        let selectedOptions = [];
        let sessionResults = {}; // 新增：记录当前轮次每道题的作答情况 (correct / wrong)

        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const submitBtn = document.getElementById('submitBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const feedback = document.getElementById('feedback');
        const progress = document.getElementById('progress');
        const toggleMode = document.getElementById('toggleMode');
        const toggleShuffle = document.getElementById('toggleShuffle');
        const qTypeBadge = document.getElementById('qTypeBadge');

        // 洗牌算法
        function shuffleArray(arr) {
            let array = [...arr];
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 保存当前所有状态
        function saveState() {
            localStorage.setItem('xisi_app_state', JSON.stringify({
                isMistakeMode,
                isShuffleMode,
                currentIndex,
                sessionResults, // 新增：保存作答记录
                order: currentQuestions.map(q => q.id)
            }));
        }

        // 读取状态
        function loadState() {
            const state = JSON.parse(localStorage.getItem('xisi_app_state'));
            if (state && state.order && state.order.length > 0) {
                isMistakeMode = state.isMistakeMode;
                isShuffleMode = state.isShuffleMode;
                currentIndex = state.currentIndex;
                sessionResults = state.sessionResults || {}; // 恢复作答记录
                
                currentQuestions = state.order.map(id => allQuestions.find(q => q.id === id)).filter(Boolean);
                if (currentQuestions.length === 0) resetAndApply();
            } else {
                resetAndApply();
            }
            updateUI();
            updateScoreBoard();
            renderQuestion();
        }

        // 重新生成题库并清空进度
        function resetAndApply() {
            let base = isMistakeMode ? allQuestions.filter(q => mistakes.includes(q.id)) : [...allQuestions];
            
            if (base.length === 0 && isMistakeMode) {
                alert("错题本已经被你清空啦！将返回全部题库。");
                isMistakeMode = false;
                base = [...allQuestions];
            }

            if (isShuffleMode) {
                base = shuffleArray(base);
            }
            
            currentQuestions = base;
            currentIndex = 0;
            sessionResults = {}; // 重置时清空统计数据
            
            saveState();
            updateUI();
            updateScoreBoard();
        }

        // 新增：更新得分面板数据
        function updateScoreBoard() {
            let correct = 0, wrong = 0;
            currentQuestions.forEach(q => {
                if (sessionResults[q.id] === 'correct') correct++;
                else if (sessionResults[q.id] === 'wrong') wrong++;
            });
            const unanswered = currentQuestions.length - correct - wrong;

            document.getElementById('countCorrect').innerText = correct;
            document.getElementById('countWrong').innerText = wrong;
            document.getElementById('countUnanswered').innerText = unanswered;
        }

        function updateUI() {
            toggleShuffle.innerText = isShuffleMode ? "🔀 乱序" : "⬇️ 顺序";
            toggleShuffle.style.color = isShuffleMode ? "#8540f5" : "#007bff";
            toggleShuffle.style.borderColor = isShuffleMode ? "#8540f5" : "#007bff";

            toggleMode.innerText = isMistakeMode ? "退出错题本" : "进入错题本";
            toggleMode.style.color = isMistakeMode ? "#dc3545" : "#6c757d";
            toggleMode.style.borderColor = isMistakeMode ? "#dc3545" : "#6c757d";
        }

        function renderQuestion() {
            if (currentIndex >= currentQuestions.length) currentIndex = 0;
            if(currentQuestions.length === 0) return;

            const q = currentQuestions[currentIndex];
            progress.innerText = `进度: ${currentIndex + 1} / ${currentQuestions.length}`;
            
            // 设置标签文字
            let baseLabel = q.type === 'tf' ? '判断题' : (q.type === 'single' ? '单选题' : '多选题');
            let baseColor = q.type === 'multi' ? '#fd7e14' : '#007bff';
            
            // 贴心小功能：如果这题这轮做过了，标签会有提示
            if (sessionResults[q.id] === 'correct') {
                qTypeBadge.innerText = baseLabel + ' (已答对)';
                qTypeBadge.style.backgroundColor = '#28a745';
            } else if (sessionResults[q.id] === 'wrong') {
                qTypeBadge.innerText = baseLabel + ' (已答错)';
                qTypeBadge.style.backgroundColor = '#dc3545';
            } else {
                qTypeBadge.innerText = baseLabel;
                qTypeBadge.style.backgroundColor = baseColor;
            }
            
            questionText.innerText = q.title;
            optionsContainer.innerHTML = '';
            selectedOptions = [];
            feedback.style.display = "none";
            
            submitBtn.disabled = false;
            submitBtn.innerText = "提交答案";
            submitBtn.style.backgroundColor = "#28a745";
            
            prevBtn.disabled = currentIndex === 0;
            nextBtn.innerText = currentIndex === currentQuestions.length - 1 ? "本轮结束" : "下一题";

            q.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerText = opt;
                const optLetter = opt.charAt(0);
                
                div.onclick = () => {
                    if (submitBtn.disabled) return; // 如果已提交则禁用点击
                    if(q.type === 'single' || q.type === 'tf') {
                        document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                        selectedOptions = [optLetter];
                        div.classList.add('selected');
                    } else {
                        if(selectedOptions.includes(optLetter)) {
                            selectedOptions = selectedOptions.filter(item => item !== optLetter);
                            div.classList.remove('selected');
                        } else {
                            selectedOptions.push(optLetter);
                            selectedOptions.sort();
                            div.classList.add('selected');
                        }
                    }
                };
                optionsContainer.appendChild(div);
            });
        }

        // --- 3. 按钮绑定事件 ---
        toggleShuffle.onclick = (e) => {
            e.preventDefault();
            if(!confirm("切换排序模式会重新开启新的一轮，当前进度将重置，是否继续？")) return;
            isShuffleMode = !isShuffleMode;
            resetAndApply();
            renderQuestion();
        };

        toggleMode.onclick = (e) => {
            e.preventDefault();
            isMistakeMode = !isMistakeMode;
            resetAndApply();
            renderQuestion();
        };

        submitBtn.onclick = () => {
            if(selectedOptions.length === 0) return alert("请先选择答案后再提交！");
            
            const q = currentQuestions[currentIndex];
            const userAnswer = selectedOptions.join('');
            const isCorrect = userAnswer === q.answer;
            
            // 标记记录
            sessionResults[q.id] = isCorrect ? 'correct' : 'wrong';
            updateScoreBoard(); // 实时更新计分板
            
            const optionDivs = document.querySelectorAll('.option');
            optionDivs.forEach(div => {
                const letter = div.innerText.charAt(0);
                if(q.answer.includes(letter)) div.classList.add('correct');
                if(selectedOptions.includes(letter) && !q.answer.includes(letter)) div.classList.add('wrong');
            });

            feedback.style.display = "block";
            if(isCorrect) {
                feedback.innerText = "✅ 回答正确！";
                feedback.style.color = "#28a745";
                feedback.style.backgroundColor = "#d4edda";
                
                // 从错题本移除
                if(isMistakeMode) {
                    mistakes = mistakes.filter(id => id !== q.id);
                    localStorage.setItem('xisi_mistakes', JSON.stringify(mistakes));
                }
            } else {
                feedback.innerText = `❌ 回答错误。正确答案是: ${q.answer}`;
                feedback.style.color = "#dc3545";
                feedback.style.backgroundColor = "#f8d7da";
                
                // 记入错题本
                if(!mistakes.includes(q.id)) {
                    mistakes.push(q.id);
                    localStorage.setItem('xisi_mistakes', JSON.stringify(mistakes));
                }
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "已提交";
            submitBtn.style.backgroundColor = "#a0cbfc";
            
            saveState(); // 保存最新状态
        };

        prevBtn.onclick = () => {
            if (currentIndex > 0) {
                currentIndex--;
                saveState();
                renderQuestion();
            }
        };

        nextBtn.onclick = () => {
            if (currentIndex >= currentQuestions.length - 1) {
                alert("恭喜你，这一轮刷完啦！将自动生成新一轮的列表。");
                resetAndApply(); 
            } else {
                currentIndex++;
            }
            saveState();
            renderQuestion();
        };

        // 启动应用
        loadState();
    }
</script>
</body>
</html>
